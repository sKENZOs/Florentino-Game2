<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}
#wrap{background:#1a2e1a;border-radius:12px;overflow:hidden;user-select:none;}
#ui{display:flex;gap:16px;align-items:center;padding:8px 14px;background:rgba(0,0,0,0.4);flex-wrap:wrap;}
.lbl{font-size:12px;color:#aaa;}
.bar-bg{width:100px;height:8px;background:#333;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.15s;}
#modetxt{font-size:12px;color:#ffd700;margin-left:auto;}
#msg{font-size:12px;color:#a8e6cf;padding:4px 14px 6px;min-height:20px;background:rgba(0,0,0,0.3);}
#gc{display:block;cursor:crosshair;outline:none;}
</style>
</head>
<body>
<div id="wrap">
<div id="ui">
  <span class="lbl">HP</span><div class="bar-bg"><div class="bar-fill" id="hpbar" style="width:100%;background:#4caf50;"></div></div>
  <span class="lbl">สกิล</span><div class="bar-bg"><div class="bar-fill" id="skillbar" style="width:100%;background:#9c27b0;"></div></div>
  <span id="modetxt">ปกติ</span>
</div>
<div id="msg">WASD/ลูกศร=เดิน | คลิกซ้าย=โจมตีประชิด | Z=สกิลปาดอกไม้</div>
<canvas id="gc" width="680" height="400" tabindex="0"></canvas>
</div>
<script>
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const W=680,H=400;
const keys={};

canvas.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault();if(e.key.toLowerCase()==='z')useSkill();});
canvas.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousedown',e=>{if(e.button===0)onAttack(e);});
document.addEventListener('keydown',e=>{
  const mv=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','A','s','S','d','D','w','W','z','Z'];
  if(mv.includes(e.key)){keys[e.key]=true;e.preventDefault();if(e.key.toLowerCase()==='z')useSkill();}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

const player={x:340,y:320,r:16,speed:2.8,hp:100,maxhp:100,dashing:false,dashVx:0,dashVy:0,dashTarget:null,dashTimer:0,attackCd:0,collectedFlowerEnemy:null};
const FLOWER_ORBIT=58;
const enemies=[
  {x:180,y:130,r:20,hp:100,maxhp:100,flowers:null,marked:false},
  {x:500,y:130,r:20,hp:100,maxhp:100,flowers:null,marked:false},
  {x:340,y:80, r:20,hp:100,maxhp:100,flowers:null,marked:false},
];
let particles=[],flowerProjs=[];
let skillCd=0,skillMaxCd=200;
let gameMsg='',gameMsgTimer=0;
let dashOutPending=false;

function setMsg(m,t=90){gameMsg=m;gameMsgTimer=t;}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function isKey(k){return keys[k]||keys[k.toLowerCase()]||keys[k.toUpperCase()];}

function spawnFlowersOnEnemy(e){
  e.flowers=[];e.marked=true;
  for(let i=0;i<3;i++){
    const angle=(Math.PI*2/3)*i-Math.PI/2;
    e.flowers.push({x:e.x+Math.cos(angle)*FLOWER_ORBIT,y:e.y+Math.sin(angle)*FLOWER_ORBIT,collected:false});
  }
}

function spawnParticles(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+Math.random()*3,col,life:40,maxLife:40});
  }
}

function useSkill(){
  if(skillCd>0){setMsg('สกิลยังรีชาร์จ ('+Math.ceil(skillCd/60)+'วิ)');return;}
  const alive=enemies.filter(e=>e.hp>0);
  if(!alive.length)return;
  const nearest=alive.reduce((a,b)=>dist(player,a)<dist(player,b)?a:b);
  const ang=Math.atan2(nearest.y-player.y,nearest.x-player.x);
  flowerProjs.push({x:player.x,y:player.y,vx:Math.cos(ang)*10,vy:Math.sin(ang)*10,target:nearest,life:120});
  skillCd=skillMaxCd;setMsg('ปาดอกไม้ไปยังศัตรู!');
}

function onAttack(){
  if(player.dashing)return;
  if(player.collectedFlowerEnemy&&player.collectedFlowerEnemy.hp>0){
    const te=player.collectedFlowerEnemy;
    const dx=te.x-player.x,dy=te.y-player.y,d=dist(player,te);
    player.dashing=true;player.dashVx=(dx/d)*20;player.dashVy=(dy/d)*20;
    player.dashTimer=0;player.dashTarget=te;dashOutPending=false;
    player.collectedFlowerEnemy=null;setMsg('พุ่งเข้าหาศัตรู! กดเดินเพื่อพุ่งออก');return;
  }
  const alive=enemies.filter(e=>e.hp>0);
  const near=alive.find(e=>dist(player,e)<player.r+e.r+28);
  if(near&&player.attackCd<=0){near.hp=Math.max(0,near.hp-18);spawnParticles(near.x,near.y,'#ff5722',8);player.attackCd=25;setMsg('โจมตี! -18 HP');}
  else if(!near)setMsg('ต้องเข้าใกล้ศัตรูก่อน');
}

function update(){
  if(skillCd>0)skillCd--;if(gameMsgTimer>0)gameMsgTimer--;if(player.attackCd>0)player.attackCd--;
  if(player.dashing){
    player.x+=player.dashVx;player.y+=player.dashVy;player.dashTimer++;player.dashVx*=0.82;player.dashVy*=0.82;
    if(player.dashTarget&&dist(player,player.dashTarget)<player.r+player.dashTarget.r+4){
      player.dashTarget.hp=Math.max(0,player.dashTarget.hp-28);
      spawnParticles(player.dashTarget.x,player.dashTarget.y,'#ff4081',12);
      setMsg('โจมตีประชิด! -28 HP | กดเดินเพื่อพุ่งออก');
      player.dashTarget=null;dashOutPending=true;player.dashVx*=0.05;player.dashVy*=0.05;
    }
    if(dashOutPending){
      let ox=0,oy=0;
      if(isKey('ArrowLeft')||isKey('a'))ox=-1;if(isKey('ArrowRight')||isKey('d'))ox=1;
      if(isKey('ArrowUp')||isKey('w'))oy=-1;if(isKey('ArrowDown')||isKey('s'))oy=1;
      if(ox||oy){const d=Math.hypot(ox,oy);player.dashVx=(ox/d)*18;player.dashVy=(oy/d)*18;dashOutPending=false;player.dashTimer=0;player.dashTarget=null;setMsg('พุ่งออก!');}
    }
    if(Math.hypot(player.dashVx,player.dashVy)<0.8&&!dashOutPending)player.dashing=false;
    player.x=Math.max(player.r,Math.min(W-player.r,player.x));player.y=Math.max(player.r,Math.min(H-player.r,player.y));
  } else {
    dashOutPending=false;let mx=0,my=0;
    if(isKey('ArrowLeft')||isKey('a'))mx-=1;if(isKey('ArrowRight')||isKey('d'))mx+=1;
    if(isKey('ArrowUp')||isKey('w'))my-=1;if(isKey('ArrowDown')||isKey('s'))my+=1;
    if(mx||my){const d=Math.hypot(mx,my);player.x+=mx/d*player.speed;player.y+=my/d*player.speed;}
    player.x=Math.max(player.r,Math.min(W-player.r,player.x));player.y=Math.max(player.r,Math.min(H-player.r,player.y));
  }
  flowerProjs=flowerProjs.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)return false;
    if(p.target&&p.target.hp>0&&dist(p,p.target)<p.target.r+10){
      if(!p.target.marked){spawnFlowersOnEnemy(p.target);setMsg('ดอกไม้ล้อม! เดินไปเก็บแล้วคลิก');}
      spawnParticles(p.target.x,p.target.y,'#ff69b4',6);return false;
    }
    return true;
  });
  enemies.forEach(e=>{
    if(!e.marked||!e.flowers||e.hp<=0)return;
    e.flowers.forEach(f=>{
      if(f.collected)return;
      if(dist(player,f)<player.r+12){f.collected=true;spawnParticles(f.x,f.y,'#ff69b4',8);player.collectedFlowerEnemy=e;setMsg('เก็บดอกไม้! คลิกซ้ายเพื่อพุ่งใส่ศัตรู');}
    });
    if(e.flowers.every(f=>f.collected)){e.marked=false;e.flowers=null;}
  });
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
  document.getElementById('hpbar').style.width=(player.hp/player.maxhp*100)+'%';
  document.getElementById('skillbar').style.width=(Math.max(0,(skillMaxCd-skillCd)/skillMaxCd)*100)+'%';
  const hasColl=player.collectedFlowerEnemy&&player.collectedFlowerEnemy.hp>0;
  document.getElementById('modetxt').textContent=hasColl?'🌸 โหมดพุ่ง':'ปกติ';
  document.getElementById('modetxt').style.color=hasColl?'#ff69b4':'#ffd700';
}

function drawFlower(x,y,col,size){
  for(let i=0;i<5;i++){const a=(Math.PI*2/5)*i;ctx.beginPath();ctx.arc(x+Math.cos(a)*size*.7,y+Math.sin(a)*size*.7,size*.55,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();}
  ctx.beginPath();ctx.arc(x,y,size*.4,0,Math.PI*2);ctx.fillStyle='#fff176';ctx.fill();
}

function draw(){
  ctx.fillStyle='#1a2e1a';ctx.fillRect(0,0,W,H);
  for(let i=0;i<7;i++)for(let j=0;j<5;j++){ctx.beginPath();ctx.arc(50+i*100,50+j*80,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fill();}
  flowerProjs.forEach(p=>{ctx.save();ctx.shadowColor='#ff69b4';ctx.shadowBlur=8;drawFlower(p.x,p.y,'#ff4081',7);ctx.restore();});
  enemies.forEach(e=>{
    if(e.hp<=0){ctx.font='22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('💀',e.x,e.y);return;}
    ctx.save();if(e.marked){ctx.shadowColor='#ff69b4';ctx.shadowBlur=16;}
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fillStyle=e.marked?'#e91e63':'#c62828';ctx.fill();ctx.strokeStyle='#ffcdd2';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👾',e.x,e.y);
    const bw=44,bx=e.x-bw/2,by=e.y-e.r-14;ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,6);ctx.fillStyle='#e53935';ctx.fillRect(bx,by,bw*(e.hp/e.maxhp),6);
    if(e.marked&&e.flowers){
      const pts=e.flowers.filter(f=>!f.collected);
      if(pts.length===3){ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);ctx.lineTo(pts[1].x,pts[1].y);ctx.lineTo(pts[2].x,pts[2].y);ctx.closePath();ctx.strokeStyle='rgba(255,105,180,0.35)';ctx.lineWidth=1.5;ctx.stroke();}
      e.flowers.forEach(f=>{if(f.collected)return;ctx.save();ctx.shadowColor='#ff69b4';ctx.shadowBlur=10;drawFlower(f.x,f.y,'#ff80ab',10);ctx.restore();});
    }
  });
  particles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.globalAlpha=1;});
  ctx.save();if(player.dashing){ctx.shadowColor='#80deea';ctx.shadowBlur=18;}
  ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fillStyle='#26c6da';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.restore();
  ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🧑',player.x,player.y);
  const bw=38,bx=player.x-bw/2,by=player.y-player.r-14;ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,6);ctx.fillStyle='#4caf50';ctx.fillRect(bx,by,bw*(player.hp/player.maxhp),6);
  const hasColl=player.collectedFlowerEnemy&&player.collectedFlowerEnemy.hp>0;
  if(hasColl){ctx.save();ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(255,105,180,0.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(player.x,player.y,player.r+10,0,Math.PI*2);ctx.stroke();ctx.restore();ctx.fillStyle='#ff69b4';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('คลิก=พุ่ง',player.x,player.y-player.r-20);}
  const attackRange=player.r+28;
  const nearEnemy=enemies.find(e=>e.hp>0&&dist(player,e)<attackRange);
  if(nearEnemy&&!hasColl&&!player.dashing){ctx.save();ctx.strokeStyle='rgba(255,200,0,0.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(player.x,player.y,attackRange,0,Math.PI*2);ctx.stroke();ctx.restore();}
  document.getElementById('msg').textContent=gameMsgTimer>0?gameMsg:'WASD/ลูกศร=เดิน | คลิกซ้าย=โจมตีประชิด | Z=สกิลปาดอกไม้';
}

function loop(){update();draw();requestAnimationFrame(loop);}
canvas.focus();
loop();
</script>
</body>
</html>
